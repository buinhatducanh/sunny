# render.yaml - Render Blueprint for Project Sunny Backend
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: sunny-db
    plan: free
    databaseName: sunny_game
    ipAllowList: []

services:
  - name: sunny-api
    type: web
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install && pnpm --filter @sunny-game/api prisma generate && pnpm build
    startCommand: node apps/api/dist/src/main.js
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sunny-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: "30d"
      - key: PORT
        value: "10000"
      - key: API_URL
        value: https://sunny-api.onrender.com
      - key: CORS_ORIGIN
        value: "*"
      - key: REDIS_URL
        value: ""
      - key: SENTRY_DSN
        value: ""
